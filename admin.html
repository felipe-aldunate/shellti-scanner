<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShellTI Scanner · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--deep:#020617;--cyan:#00D4FF;--green:#34D399;--silver:#E2E8F0;--muted:#94A3B8;--border:rgba(0,212,255,0.13);--card:rgba(3,9,24,0.93);--danger:#FF6B6B;--warn:#F59E0B;--ok:#34D399}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--deep);color:var(--silver);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:48px 48px}

/* LOGIN */
#loginView{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 54px);padding:24px}
.login-card{position:relative;z-index:1;width:100%;max-width:380px;background:var(--card);border:1px solid var(--border)}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),rgba(0,212,255,0.2))}
.login-header{padding:28px 32px 20px;text-align:center;border-bottom:1px solid var(--border)}
.logo{font-size:1.3rem;font-weight:800;color:var(--silver)}.logo span{color:var(--cyan)}
.login-sub{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.login-body{padding:24px 32px 28px}
.field{margin-bottom:16px}
.flabel{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
input[type=password]{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--silver);font-family:'JetBrains Mono',monospace;font-size:.82rem;padding:11px 14px;outline:none;transition:border-color .2s}
input[type=password]:focus{border-color:rgba(0,212,255,0.5)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--cyan),#00b8e6);color:var(--deep);border:none;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:12px;cursor:pointer;transition:opacity .2s}
.btn-login:hover{opacity:.9}
.login-err{display:none;margin-top:12px;padding:10px 14px;background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--danger);font-family:'JetBrains Mono',monospace;font-size:.68rem;text-align:center}
.login-err.visible{display:block}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(2,6,23,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-weight:800;font-size:1rem;color:var(--silver)}.nav-logo span{color:var(--cyan)}
.nav-sub{font-family:'JetBrains Mono',monospace;font-size:.52rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-tab{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;cursor:pointer;border:1px solid transparent;color:var(--muted);background:transparent;transition:all .2s}
.nav-tab.active,.nav-tab:hover{color:var(--cyan);border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.06)}
.btn-logout{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;cursor:pointer;border:1px solid rgba(255,107,107,0.3);color:var(--danger);background:rgba(255,107,107,0.06);transition:all .2s}
.btn-logout:hover{background:rgba(255,107,107,0.15)}

/* MAIN */
#adminView{display:none;position:relative;z-index:1}
.main{max-width:1000px;margin:0 auto;padding:32px 40px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin-bottom:28px}
.stat{background:var(--card);padding:18px 20px}
.stat-val{font-size:1.8rem;font-weight:800;line-height:1}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.c-cyan{color:var(--cyan)}.c-ok{color:var(--ok)}.c-warn{color:var(--warn)}.c-danger{color:var(--danger)}

/* SECTION */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1px;padding:10px 0}
.section-title{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--green);display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:16px;height:1px;background:var(--green)}
.badge{font-family:'JetBrains Mono',monospace;font-size:.58rem;padding:2px 8px;background:rgba(0,212,255,0.08);border:1px solid var(--border);color:var(--cyan)}

/* CARDS */
.req-card{background:var(--card);border:1px solid transparent;margin-bottom:1px;padding:18px 20px;transition:border-color .2s}
.req-card:hover{border-color:var(--border)}
.req-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.req-info{flex:1}
.req-name{font-size:.9rem;font-weight:700;color:var(--silver);margin-bottom:2px}
.req-company{font-size:.78rem;color:var(--muted)}
.req-email{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--cyan);margin-top:4px}
.req-reason{font-size:.78rem;color:var(--muted);margin-top:8px;line-height:1.6;font-style:italic}
.req-time{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted)}
.req-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end}

/* DURATION PICKER */
.dur-picker{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;justify-content:flex-end}
.dur-btn{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;transition:all .2s}
.dur-btn.sel{border-color:rgba(0,212,255,0.5);color:var(--cyan);background:rgba(0,212,255,0.08)}
.dur-btn:hover{border-color:rgba(0,212,255,0.3);color:var(--cyan)}

.action-row{display:flex;gap:6px}
.btn-approve{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;border:none;background:rgba(52,211,153,0.15);color:var(--ok);border:1px solid rgba(52,211,153,0.3);cursor:pointer;transition:all .2s}
.btn-approve:hover{background:rgba(52,211,153,0.25)}
.btn-approve:disabled{opacity:.4;cursor:not-allowed}
.btn-reject{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;background:rgba(255,107,107,0.1);color:var(--danger);border:1px solid rgba(255,107,107,0.3);cursor:pointer;transition:all .2s}
.btn-reject:hover{background:rgba(255,107,107,0.2)}

/* STATUS TAG */
.status{font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:1px;text-transform:uppercase;padding:2px 8px}
.s-pending{background:rgba(245,158,11,0.12);color:var(--warn);border:1px solid rgba(245,158,11,0.3)}
.s-approved{background:rgba(52,211,153,0.12);color:var(--ok);border:1px solid rgba(52,211,153,0.3)}
.s-rejected{background:rgba(255,107,107,0.12);color:var(--danger);border:1px solid rgba(255,107,107,0.3)}

/* USERS */
.user-row{background:var(--card);border:1px solid transparent;margin-bottom:1px;padding:14px 20px;display:flex;align-items:center;gap:16px;transition:border-color .2s}
.user-row:hover{border-color:var(--border)}
.user-info{flex:1}
.user-name{font-size:.87rem;font-weight:600;color:var(--silver)}
.user-email{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--cyan);margin-top:2px}
.user-company{font-size:.75rem;color:var(--muted)}
.user-expires{font-family:'JetBrains Mono',monospace;font-size:.62rem;margin-top:4px}
.exp-ok{color:var(--ok)}.exp-warn{color:var(--warn)}.exp-dead{color:var(--danger)}
.btn-revoke{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;background:rgba(255,107,107,0.1);color:var(--danger);border:1px solid rgba(255,107,107,0.3);cursor:pointer;transition:all .2s}
.btn-revoke:hover{background:rgba(255,107,107,0.2)}

.empty{padding:32px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted);border:1px dashed rgba(0,212,255,0.1)}
.tab-content{display:none}.tab-content.active{display:block}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;font-family:'JetBrains Mono',monospace;font-size:.7rem;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;border:1px solid}
.toast.ok{background:rgba(52,211,153,0.15);color:var(--ok);border-color:rgba(52,211,153,0.4)}
.toast.err{background:rgba(255,107,107,0.15);color:var(--danger);border-color:rgba(255,107,107,0.4)}
.toast.show{opacity:1;transform:none}

/* SHARED NAV */
.shared-nav{position:sticky;top:0;width:100%;z-index:300;background:rgba(2,6,23,0.97);backdrop-filter:blur(28px);border-bottom:1px solid var(--border)}
.shared-nav-top{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:54px}
.nav-brand-text{font-weight:800;font-size:1.1rem;color:var(--silver);letter-spacing:-.5px}
.nav-brand-text span{color:var(--cyan)}
.nav-brand-sub{font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.nav-tabs-shared{display:flex;align-items:center;height:54px;gap:0}
.nav-tab-lnk{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;padding:0 16px;height:100%;display:flex;align-items:center;text-decoration:none;color:var(--muted);border-bottom:2px solid transparent;transition:color .2s}
.nav-tab-lnk.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.nav-tag{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(0,212,255,0.3);color:var(--cyan);padding:3px 10px;background:rgba(0,212,255,0.07)}
</style>
</head>
<body>

<!-- SHARED NAV -->
<div class="shared-nav">
  <div class="shared-nav-top">
    <div>
      <div class="nav-brand-text">Shell<span>TI</span></div>
      <div class="nav-brand-sub">Scanner · Panel de Administración</div>
    </div>
    <a href="/" style="font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(148,163,184,0.4);text-decoration:none;transition:color .2s" onmouseover="this.style.color='rgba(0,212,255,0.8)'" onmouseout="this.style.color='rgba(148,163,184,0.4)'">← Volver</a>
  </div>
</div>

<!-- LOGIN -->
<div id="loginView">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">Shell<span>TI</span></div>
      <div class="login-sub">Panel de Administración</div>
    </div>
    <div class="login-body">
      <a href="/auth/google" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;border:1px solid #e2e8f0;color:#0f172a;font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:600;padding:12px;cursor:pointer;text-decoration:none;transition:box-shadow .2s;margin-bottom:16px" onmouseover="this.style.boxShadow='0 2px 12px rgba(0,0,0,0.2)'" onmouseout="this.style.boxShadow='none'">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 16.3 2 9.7 6.4 6.3 14.7z"/><path fill="#FBBC05" d="M24 46c5.9 0 10.9-2 14.5-5.4l-6.7-5.5C29.9 36.6 27.1 37.5 24 37.5c-6.1 0-10.6-3.6-12.4-8.4l-7 5.4C8.1 42.1 15.5 46 24 46z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-.8 2.4-2.2 4.4-4.1 5.8l6.7 5.5C42 36.4 45 30.7 45 24c0-1.3-.2-2.7-.5-4z"/></svg>
        Ingresar con Google
      </a>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted)">o</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <div class="field">
        <label class="flabel">Contraseña de admin</label>
        <input type="password" id="adminPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn-login" onclick="doLogin()">Ingresar con contraseña →</button>
      <div class="login-err" id="loginErr">Contraseña incorrecta</div>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminView">
  <nav style="position:sticky;top:0;z-index:200;background:rgba(2,6,23,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem;height:48px;display:flex;align-items:center;justify-content:space-between">
    <div>
      <div class="nav-logo">Shell<span>TI</span></div>
      <div class="nav-sub">Panel Admin</div>
    </div>
    <div class="nav-right">
      <div id="adminUserInfo" style="font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);display:none;align-items:center;gap:8px">
        <div id="adminAvatar" style="width:24px;height:24px;border-radius:50%;overflow:hidden;background:rgba(0,212,255,0.2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--cyan)"></div>
        <span id="adminName"></span>
      </div>
      <button class="nav-tab active" id="tabReqBtn" onclick="switchTab('requests')">Solicitudes</button>
      <button class="nav-tab" id="tabUsrBtn" onclick="switchTab('users')">Usuarios activos</button>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </nav>

  <div class="main">
    <!-- STATS -->
    <div class="stats" id="stats"></div>

    <!-- TAB: SOLICITUDES -->
    <div class="tab-content active" id="tabRequests">
      <div class="section-hd">
        <div class="section-title">Solicitudes pendientes</div>
        <button onclick="loadAll()" style="font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer" onmouseover="this.style.color='var(--cyan)'" onmouseout="this.style.color='var(--muted)'">↻ Actualizar</button>
      </div>
      <div id="pendingList"></div>

      <div class="section-hd" style="margin-top:28px">
        <div class="section-title">Historial</div>
      </div>
      <div id="historyList"></div>
    </div>

    <!-- TAB: USUARIOS -->
    <div class="tab-content" id="tabUsers">
      <div class="section-hd">
        <div class="section-title">Usuarios con acceso activo</div>
      </div>
      <div id="usersList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let adminToken = sessionStorage.getItem('shellti_admin_token') || '';
let selectedDuration = {};  // requestId -> {ms, label}

const DURATIONS = [
  { label: '1h',   ms: 3600000 },
  { label: '4h',   ms: 14400000 },
  { label: '12h',  ms: 43200000 },
  { label: '1d',   ms: 86400000 },
  { label: '3d',   ms: 259200000 },
  { label: '7d',   ms: 604800000 },
  { label: '30d',  ms: 2592000000 }
];

// ── AUTH ─────────────────────────────────────────────────────────────────────
function showAdminPanel(googleUser) {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('adminView').style.display = 'block';
  document.querySelector('.shared-nav').style.display = 'none';
  if (googleUser) {
    const info   = document.getElementById('adminUserInfo');
    const avatar = document.getElementById('adminAvatar');
    const name   = document.getElementById('adminName');
    if (name) name.textContent = googleUser.name || googleUser.email;
    if (avatar) avatar.innerHTML = googleUser.photo ? `<img src="${googleUser.photo}" style="width:100%;height:100%;object-fit:cover">` : (googleUser.name||'A')[0];
    if (info) info.style.display = 'flex';
  }
  loadAll();
  setInterval(loadAll, 30000);
}

(async function initAuth() {
  const params   = new URLSearchParams(window.location.search);
  const urlToken = params.get('adminToken');
  const urlError = params.get('error');
  if (urlError === 'unauthorized') {
    document.getElementById('loginErr').textContent = 'Email no autorizado como administrador.';
    document.getElementById('loginErr').classList.add('visible');
    return;
  }
  if (urlToken) {
    adminToken = urlToken;
    sessionStorage.setItem('shellti_admin_token', adminToken);
    window.history.replaceState({}, '', '/admin');
  }
  try {
    const res  = await fetch('/auth/google/status');
    const data = await res.json();
    if (data.authenticated) {
      if (!adminToken && data.adminToken) {
        adminToken = data.adminToken;
        sessionStorage.setItem('shellti_admin_token', adminToken);
      }
      showAdminPanel(data.user);
      return;
    }
  } catch(e) {}
  if (adminToken) showAdminPanel();
})();

async function doLogin() {
  const pass = document.getElementById('adminPass').value;
  const err  = document.getElementById('loginErr');
  try {
    const res  = await fetch('/admin/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pass })
    });
    const data = await res.json();
    if (data.token) {
      adminToken = data.token;
      sessionStorage.setItem('shellti_admin_token', adminToken);
      err.classList.remove('visible');
      showAdminPanel();
    } else {
      err.classList.add('visible');
    }
  } catch(e) { err.classList.add('visible'); }
}

function doLogout() {
  sessionStorage.removeItem('shellti_admin_token');
  window.location.href = '/auth/logout';
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + (tab === 'requests' ? 'Requests' : 'Users')).classList.add('active');
  document.getElementById('tab' + (tab === 'requests' ? 'Req' : 'Usr') + 'Btn').classList.add('active');
  if (tab === 'users') loadUsers();
}

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const res  = await fetch('/admin/requests', {
      headers: {'x-admin-token': adminToken}
    });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    renderRequests(data.requests || []);
    renderStats(data.requests || [], data.users || []);
  } catch(e) {}
}

async function loadUsers() {
  try {
    const res  = await fetch('/admin/users', {
      headers: {'x-admin-token': adminToken}
    });
    const data = await res.json();
    renderUsers(data.users || []);
  } catch(e) {}
}

// ── RENDER STATS ─────────────────────────────────────────────────────────────
function renderStats(requests, users) {
  const pending  = requests.filter(r => r.status === 'pending').length;
  const approved = requests.filter(r => r.status === 'approved').length;
  const active   = users.filter(u => u.active && new Date(u.expiresAt) > new Date()).length;
  const total    = requests.length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val c-warn">${pending}</div><div class="stat-label">Pendientes</div></div>
    <div class="stat"><div class="stat-val c-ok">${active}</div><div class="stat-label">Activos ahora</div></div>
    <div class="stat"><div class="stat-val c-cyan">${approved}</div><div class="stat-label">Aprobados total</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--muted)">${total}</div><div class="stat-label">Solicitudes total</div></div>`;
}

// ── RENDER REQUESTS ───────────────────────────────────────────────────────────
function renderRequests(requests) {
  const pending = requests.filter(r => r.status === 'pending');
  const history = requests.filter(r => r.status !== 'pending');

  document.getElementById('pendingList').innerHTML = pending.length
    ? pending.map(reqCard).join('')
    : '<div class="empty">Sin solicitudes pendientes</div>';

  document.getElementById('historyList').innerHTML = history.length
    ? history.map(reqCard).join('')
    : '<div class="empty">Sin historial</div>';
}

function reqCard(r) {
  const isPending = r.status === 'pending';
  const durPicker = isPending ? `
    <div class="dur-picker">
      ${DURATIONS.map(d => `
        <button class="dur-btn ${(selectedDuration[r.id]?.label === d.label) ? 'sel' : ''}"
          onclick="selectDur('${r.id}', ${d.ms}, '${d.label}', this)">
          ${d.label}
        </button>`).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
      <label style="font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1px;color:var(--muted);white-space:nowrap">Máx. consultas</label>
      <input type="number" id="maxScans-${r.id}" min="1" max="999" placeholder="∞ ilimitado"
        style="width:110px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--silver);font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:4px 8px;outline:none"
        onfocus="this.style.borderColor='rgba(0,212,255,0.5)'" onblur="this.style.borderColor='var(--border)'" />
    </div>
    <div class="action-row">
      <button class="btn-approve" id="approve-${r.id}" onclick="approve('${r.id}')">✓ Aprobar</button>
      <button class="btn-reject" onclick="reject('${r.id}')">✗ Rechazar</button>
    </div>` : `
    <div class="action-row" style="margin-top:4px">
      <span class="status s-${r.status}">${r.status}</span>
      ${r.durationLabel ? `<span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted)">· ${r.durationLabel}</span>` : ''}
    </div>`;

  return `
    <div class="req-card">
      <div class="req-top">
        <div class="req-info">
          <div class="req-name">${r.name}</div>
          <div class="req-company">${r.company}</div>
          <div class="req-email">${r.email}</div>
          <div class="req-reason">"${r.reason}"</div>
        </div>
        <div class="req-actions">
          <div class="req-time">${formatDate(r.createdAt)}</div>
          ${durPicker}
        </div>
      </div>
    </div>`;
}

// ── RENDER USERS ──────────────────────────────────────────────────────────────
function renderUsers(users) {
  const active = users.filter(u => u.active);
  document.getElementById('usersList').innerHTML = active.length
    ? active.map(userRow).join('')
    : '<div class="empty">Sin usuarios activos</div>';
}

function userRow(u) {
  const exp      = new Date(u.expiresAt);
  const now      = new Date();
  const diffMs   = exp - now;
  const diffH    = Math.floor(diffMs / 3600000);
  const diffMin  = Math.floor((diffMs % 3600000) / 60000);
  let expLabel, expClass;
  if (diffMs <= 0) { expLabel = 'Expirado'; expClass = 'exp-dead'; }
  else if (diffH < 2) { expLabel = `Expira en ${diffMin}min`; expClass = 'exp-warn'; }
  else if (diffH < 24) { expLabel = `Expira en ${diffH}h`; expClass = 'exp-ok'; }
  else { expLabel = `Expira ${exp.toLocaleDateString('es-CL')}`; expClass = 'exp-ok'; }

  return `
    <div class="user-row">
      <div class="user-info">
        <div class="user-name">${u.name}</div>
        <div class="user-email">${u.email}</div>
        <div class="user-company">${u.company}</div>
        <div class="user-expires ${expClass}">${expLabel}</div>
        ${u.maxScans != null ? `<div style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:${(u.scansUsed||0)>=u.maxScans?'var(--danger)':'var(--muted)'}">🔍 ${u.scansUsed||0}/${u.maxScans} consultas usadas</div>` : ''}
      </div>
      <button class="btn-revoke" onclick="revoke('${u.email}')">✗ Revocar</button>
    </div>`;
}

// ── ACCIONES ──────────────────────────────────────────────────────────────────
function selectDur(id, ms, label, btn) {
  selectedDuration[id] = { ms, label };
  btn.closest('.dur-picker').querySelectorAll('.dur-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

async function approve(id) {
  const dur = selectedDuration[id];
  if (!dur) { toast('Selecciona una duración primero', 'err'); return; }
  const maxScansInput = document.getElementById('maxScans-' + id);
  const maxScans = maxScansInput && maxScansInput.value ? parseInt(maxScansInput.value) : null;
  const btn = document.getElementById('approve-' + id);
  btn.disabled = true; btn.textContent = '...';
  try {
    const res  = await fetch(`/admin/approve/${id}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-admin-token':adminToken},
      body: JSON.stringify({ durationMs: dur.ms, durationLabel: dur.label, maxScans })
    });
    const data = await res.json();
    if (data.success) {
      const scansTxt = maxScans ? ` · ${maxScans} consultas máx.` : '';
      toast(`Acceso aprobado por ${dur.label}${scansTxt} — email enviado`, 'ok');
      loadAll();
    }
    else { toast(data.error || 'Error', 'err'); btn.disabled = false; btn.textContent = '✓ Aprobar'; }
  } catch(e) { toast('Error de conexión', 'err'); btn.disabled = false; btn.textContent = '✓ Aprobar'; }
}

async function reject(id) {
  if (!confirm('¿Rechazar esta solicitud?')) return;
  try {
    const res  = await fetch(`/admin/reject/${id}`, {
      method: 'POST',
      headers: {'x-admin-token': adminToken}
    });
    const data = await res.json();
    if (data.success) { toast('Solicitud rechazada', 'ok'); loadAll(); }
    else toast(data.error || 'Error', 'err');
  } catch(e) { toast('Error de conexión', 'err'); }
}

async function revoke(email) {
  if (!confirm(`¿Revocar acceso de ${email}?`)) return;
  try {
    const res  = await fetch('/admin/revoke', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-admin-token':adminToken},
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (data.success) { toast('Acceso revocado', 'ok'); loadAll(); loadUsers(); }
    else toast(data.error || 'Error', 'err');
  } catch(e) { toast('Error de conexión', 'err'); }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function formatDate(iso) {
  return new Date(iso).toLocaleString('es-CL', {
    day:'2-digit', month:'2-digit', year:'2-digit',
    hour:'2-digit', minute:'2-digit'
  });
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3500);
}
</script>
</body>
</html>
